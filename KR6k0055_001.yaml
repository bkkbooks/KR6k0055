body:
  text: 後漢安息三藏安世高譯如是我聞一時佛住王舍城迦蘭陀竹園爾時尊者目連晡時從禪定覺往至世尊所頭面禮足却住一面時尊者大目連白佛言世尊意有所疑今欲請問唯願聽許佛告目連聽汝所問當為汝說目連即白佛言世尊若比丘比丘尼無慚愧心輕慢佛語犯衆學戒如是犯波羅提提舍尼波夜提偷蘭遮僧伽婆尸沙波羅夷得幾所不饒益罪唯願解說佛告目連諦聽諦聽當為汝說若比丘比丘尼無慚無愧輕慢佛語犯衆學戒如四天王天壽五百歲墮泥犁中於人間數九百千歲佛告目連無慚無愧輕慢佛語犯波羅提提舍尼如三十三天壽一千歲墮泥犁中於人間數三億六十千歲佛告目連無慚無愧輕慢佛語犯波夜提如夜摩天壽二千歲墮泥犁中於人間數二十億四十千歲佛告目連無慚無愧輕慢佛語犯偷蘭遮如兜率天壽四千歲墮泥犁中於人間數五十億六十千歲佛告目連無慚無愧輕慢佛語犯僧伽婆尸沙如不憍樂天壽八千歲墮泥犁中於人間數二百三十億四十千歲佛告目連無慚無愧輕慢佛語犯波羅夷如他化自在天壽十六千歲墮泥犁中於人間數九百二十一億六十千歲時尊者目連聞佛所說歡喜奉行爾時尊者目連即說偈言因緣輕慢故命終墮惡道因緣修善者於此生天上緣斯修福業離惡得解脫不善觀因緣身壞入惡道比丘謹慎樂放逸多憂譴變諍小致大積惡入火𤆶持戒福致喜破戒有懼心永斷三界漏爾乃得涅槃戒德可恃怙福報常隨己見法為人長衆遠三惡道戒慎除恐畏福德三界尊鬼龍蛇毒害不犯持戒人神仙五通人造世諸呪術為諸慚愧者斷諸無慚愧如來制禁戒半月半月說已說戒利益稽首禮諸佛
