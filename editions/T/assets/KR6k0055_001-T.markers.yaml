  - {type: variant, offset: 469, length: 120, content: '比丘謹慎樂，放逸多憂譴，

      變諍小致大，積惡入火𤆶＝焚【三】【宮】𤆶【大】，焚【宋】【元】【明】【宮】𤆶焚。

      持戒福致喜，破戒有懼心，

      永斷三界漏，爾乃得涅槃。

      戒德可恃怙，福報常隨己＝心【三】【宮】己【大】，心【宋】【元】【明】【宮】己心，

      見法為人長，眾＝永【三】眾【大】，永【宋】【元】【明】眾永遠三惡道。

      戒慎除恐畏，福德三界尊，

      鬼龍蛇＝邪【三】【宮】蛇【大】，邪【宋】【元】【明】【宮】蛇邪毒害，不犯持戒人∞神仙五通人【宋】不犯持戒人【大】∞神仙五通人【宋】不犯持戒人神仙五通人。

      不犯持戒人∞神仙五通人【宋】神仙五通人【大】∞不犯持戒人【宋】神仙五通人不犯持戒人，造世諸呪術，

      為諸＝彼【三】諸【大】，彼【宋】【元】【明】諸彼慚愧者，斷諸無慚愧。

      如來制禁戒，半月半月說，

      已說戒利益，稽首禮諸佛。」', 聖乙: 為福受樂報所欲皆自然超逾生死流上家之涅槃若人為福者天神自然護所願皆疾成眾魔莫能壞}
